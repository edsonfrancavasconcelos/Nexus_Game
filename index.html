<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WINGS FIGHT: NEXUS WAR</title>
    <style>
        @import url('https://googleapis.com');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; user-select: none; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .bar-container { width: 200px; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid #333; margin-top: 5px; position: relative; }
        .bar-fill { height: 100%; transition: width 0.2s; }
        #shield-bar { background: #00d4ff; box-shadow: 0 0 10px #00d4ff; }
        #special-bar { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        .stats { position: absolute; top: 20px; left: 20px; }
        .minimap { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px; background: rgba(0,212,255,0.05); border: 1px solid #00d4ff44; border-radius: 50%; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; color: #fff; text-align: center; display: none; text-shadow: 0 0 20px #00d4ff; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stats">
        <div style="color: #00d4ff; font-size: 24px; font-weight: 900;" id="score">SCORE: 000000</div>
        <div style="color: #aaa; font-size: 12px;" id="zone-name">ZONA: NEBULOSA CRIMSON</div>
        <div class="bar-container"><div id="shield-bar" class="bar-fill" style="width: 100%"></div></div>
        <div style="font-size: 8px; color: #00d4ff;">ESCUDO REGENERATIVO</div>
        <div class="bar-container"><div id="special-bar" class="bar-fill" style="width: 100%"></div></div>
        <div style="font-size: 8px; color: #ff00ff;">PULSO NOVA (Q)</div>
    </div>
    <div class="minimap" id="minimap"></div>
    <div id="msg">ONDA 1</div>
</div>

<canvas id="game"></canvas>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Configuração de Ambientes
const ZONES = [
    { name: "NEBULOSA CRIMSON", bg: "#0a0005", accent: "#ff0055", starCount: 150 },
    { name: "CINTURÃO DE ASTEROIDES", bg: "#00050a", accent: "#00d4ff", starCount: 200 },
    { name: "GALÁXIA VÓRTEX", bg: "#000a05", accent: "#00ff66", starCount: 180 },
    { name: "CAMPO QUASAR", bg: "#0a0500", accent: "#ffaa00", starCount: 220 },
    { name: "ZONA ABISSAL", bg: "#05000a", accent: "#aa00ff", starCount: 150 }
];

// Estado Global
let gameActive = true;
let score = 0;
let currentZone = 0;
let shake = 0;
let specialReady = 100;
const keys = {};

const player = {
    x: canvas.width/2, y: canvas.height - 100,
    w: 40, h: 45, speed: 6, shield: 100,
    boost: false, pulseActive: 0
};

const enemies = [];
const projectiles = [];
const particles = [];
const stars = [];

// Inicialização
function initStars() {
    stars.length = 0;
    for(let i=0; i<ZONES[currentZone].starCount; i++) {
        stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 + 1, v: Math.random()*3 + 1 });
    }
}

// IA dos Inimigos
class Enemy {
    constructor(type) {
        this.x = Math.random() * canvas.width;
        this.y = -50;
        this.type = type; // scout, fighter, bomber, elite
        this.hp = type === 'elite' ? 5 : (type === 'bomber' ? 3 : 1);
        this.speed = type === 'scout' ? 5 : 2;
        this.angle = 0;
        this.s = 25;
    }
    update() {
        if(this.type === 'scout') {
            this.y += this.speed;
            this.x += Math.sin(this.y * 0.05) * 5;
        } else if(this.type === 'bomber') {
            this.y += 1.5;
            this.x += (player.x - this.x) * 0.01;
        } else {
            this.y += this.speed;
        }
    }
}

// Controles
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'KeyQ' && specialReady >= 100) triggerPulse();
});
window.addEventListener('keyup', e => keys[e.code] = false);

function triggerPulse() {
    player.pulseActive = 30;
    specialReady = 0;
    shake = 20;
    enemies.forEach((e, i) => {
        if(Math.hypot(e.x - player.x, e.y - player.y) < 300) {
            destroyEnemy(e, i);
        }
    });
}

function destroyEnemy(e, index) {
    for(let i=0; i<15; i++) {
        particles.push({
            x: e.x, y: e.y,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 1, color: ZONES[currentZone].accent
        });
    }
    enemies.splice(index, 1);
    score += 150;
}

function fire() {
    const pCount = score > 10000 ? 2 : 1;
    if(pCount === 1) {
        projectiles.push({ x: player.x, y: player.y - 20, v: -15, color: '#fff' });
    } else {
        projectiles.push({ x: player.x - 10, y: player.y - 20, v: -15, color: '#00d4ff' });
        projectiles.push({ x: player.x + 10, y: player.y - 20, v: -15, color: '#00d4ff' });
    }
}

let frame = 0;
function loop() {
    if(!gameActive) return;
    frame++;

    // Mudança de Zona
    if(score > (currentZone + 1) * 5000 && currentZone < 4) {
        currentZone++;
        initStars();
        document.getElementById('zone-name').innerText = "ZONA: " + ZONES[currentZone].name;
    }

    // Canvas Reset & Shake
    ctx.fillStyle = ZONES[currentZone].bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const sx = (Math.random()-0.5) * shake;
    const sy = (Math.random()-0.5) * shake;
    if(shake > 0) shake *= 0.9;

    // Estrelas Parallax
    ctx.fillStyle = "#fff";
    stars.forEach(s => {
        s.y += s.v + (keys['ShiftLeft'] ? 10 : 0);
        if(s.y > canvas.height) s.y = 0;
        ctx.globalAlpha = s.v/4;
        ctx.fillRect(s.x, s.y, s.s, s.s);
    });
    ctx.globalAlpha = 1;

    // Movimento Jogador
    const currentSpeed = (keys['ShiftLeft'] ? player.speed * 2 : player.speed);
    if(keys['KeyA'] || keys['ArrowLeft']) player.x -= currentSpeed;
    if(keys['KeyD'] || keys['ArrowRight']) player.x += currentSpeed;
    if(keys['KeyW'] || keys['ArrowUp']) player.y -= currentSpeed;
    if(keys['KeyS'] || keys['ArrowDown']) player.y += currentSpeed;

    // Desenhar Nave Jogador
    ctx.save();
    ctx.translate(player.x + sx, player.y + sy);
    // Motor
    const engineSize = (keys['ShiftLeft'] ? 30 : 15) + Math.random()*5;
    const g = ctx.createRadialGradient(0, 20, 0, 0, 20, engineSize);
    g.addColorStop(0, '#fff'); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 20, engineSize, 0, Math.PI*2); ctx.fill();
    // Fuselagem
    ctx.fillStyle = "#16213e"; ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(-20, 15); ctx.lineTo(20, 15); ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Escudo Visual
    if(player.shield > 0) {
        ctx.strokeStyle = "#00d4ff"; ctx.globalAlpha = player.shield/200;
        ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI*2); ctx.stroke();
    }
    // Especial Nova
    if(player.pulseActive > 0) {
        ctx.strokeStyle = "#ff00ff"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(0, 0, (30 - player.pulseActive) * 15, 0, Math.PI*2); ctx.stroke();
        player.pulseActive--;
    }
    ctx.restore();

    // Spawning Inimigos
    if(frame % 60 === 0) {
        const types = ['scout', 'fighter', 'bomber', 'elite'];
        enemies.push(new Enemy(types[Math.floor(Math.random() * (currentZone + 1))]));
    }

    // Lógica de Tiros e Inimigos
    if(frame % 10 === 0 && keys['Space']) fire();

    projectiles.forEach((p, i) => {
        p.y += p.v;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x-2, p.y, 4, 15);
        if(p.y < -50) projectiles.splice(i, 1);
    });

    enemies.forEach((e, i) => {
        e.update();
        // Desenho Inimigo
        ctx.save(); ctx.translate(e.x, e.y);
        ctx.fillStyle = "#300"; ctx.strokeStyle = ZONES[currentZone].accent;
        ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-15, -15); ctx.lineTo(15, -15); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();

        // Colisão Jogador vs Inimigo
        if(Math.hypot(e.x - player.x, e.y - player.y) < 40) {
            player.shield -= 20;
            shake = 10;
            destroyEnemy(e, i);
        }

        // Colisão Tiro vs Inimigo
        projectiles.forEach((p, pi) => {
            if(Math.hypot(p.x - e.x, p.y - e.y) < 20) {
                destroyEnemy(e, i);
                projectiles.splice(pi, 1);
            }
        });

        if(e.y > canvas.height + 50) enemies.splice(i, 1);
    });

    // Partículas
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 2, 2);
        if(p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;

    // UI Updates
    if(specialReady < 100) specialReady += 0.3;
    if(player.shield < 100) player.shield += 0.05;
    document.getElementById('shield-bar').style.width = player.shield + '%';
    document.getElementById('special-bar').style.width = specialReady + '%';
    document.getElementById('score').innerText = "SCORE: " + score.toString().padStart(6, '0');

    if(player.shield <= 0) {
        gameActive = false;
        document.getElementById('msg').innerHTML = "MISSÃO FRACASSADA<br><span style='font-size:15px'>SCORE: "+score+"</span>";
        document.getElementById('msg').style.display = "block";
    }

    requestAnimationFrame(loop);
}

initStars();
loop();

// Minimap
setInterval(() => {
    const mini = document.getElementById('minimap');
    mini.innerHTML = '';
    enemies.forEach(e => {
        const dot = document.createElement('div');
        dot.style.cssText = `position:absolute; width:4px; height:4px; background:${ZONES[currentZone].accent}; left:${(e.x/canvas.width)*100}%; top:${(e.y/canvas.height)*100}%; border-radius:50%`;
        mini.appendChild(dot);
    });
}, 100);

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
});

</script>
</body>
</html>
