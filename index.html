<!DOCTYPE html>
<html>
<head>
    <title>NEXUS GAME - ULTRA EDITION</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #00ff00; font-family: 'Courier New', monospace; }
        #hud { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="hud">
        <h1 style="margin:0; color: #00d4ff;">NEXUS GAME: NÍVEL <span id="lvl">1</span></h1>
        <div>ARMA: <span id="arma" style="color: #fff;">LASER</span> | SCORE: <span id="score">0</span></div>
        <div style="color: #555; font-size: 12px; margin-top: 5px;">[1] Laser | [2] Hydro (Triplo) | [3] Nuclear (Explosivo)</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let nivel = 1;
        let armaAtual = 'LASER';
        let mouse = { x: canvas.width/2, y: canvas.height/2 };
        
        const tiros = [];
        const inimigos = [];
        const particulas = [];
        const estrelas = Array.from({length: 100}, () => ({
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            s: Math.random() * 2
        }));

        class Tiro {
            constructor(x, y, tipo, angle = 0) {
                this.x = x; this.y = y; this.tipo = tipo;
                this.angle = angle;
                this.size = tipo === 'NUCLEAR' ? 10 : 4;
                this.color = tipo === 'LASER' ? '#ff0000' : (tipo === 'HYDRO' ? '#00ffff' : '#00ff00');
                this.speed = tipo === 'NUCLEAR' ? 4 : 15;
            }
            update() {
                this.y -= this.speed;
                this.x += this.angle;
                if(this.tipo === 'NUCLEAR') this.size += 0.2;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function criarExplosao(x, y, cor) {
            for(let i=0; i<20; i++) {
                particulas.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, 
                    vy: (Math.random()-0.5)*10, 
                    life: 1.0, 
                    cor
                });
            }
        }

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        
        window.addEventListener('mousedown', () => {
            if(armaAtual === 'LASER') {
                tiros.push(new Tiro(mouse.x, mouse.y, 'LASER'));
            } else if(armaAtual === 'HYDRO') {
                tiros.push(new Tiro(mouse.x, mouse.y, 'HYDRO', -2));
                tiros.push(new Tiro(mouse.x, mouse.y, 'HYDRO', 0));
                tiros.push(new Tiro(mouse.x, mouse.y, 'HYDRO', 2));
            } else {
                tiros.push(new Tiro(mouse.x, mouse.y, 'NUCLEAR'));
            }
        });

        window.addEventListener('keydown', e => {
            if(e.key === '1') armaAtual = 'LASER';
            if(e.key === '2') armaAtual = 'HYDRO';
            if(e.key === '3') armaAtual = 'NUCLEAR';
            document.getElementById('arma').innerText = armaAtual;
        });

        function loop() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrelas de fundo
            ctx.fillStyle = "#fff";
            estrelas.forEach(s => {
                s.y += s.s + (nivel * 0.5);
                if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // Desenhar Nave
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(mouse.x, mouse.y - 20);
            ctx.lineTo(mouse.x - 20, mouse.y + 20);
            ctx.lineTo(mouse.x + 20, mouse.y + 20);
            ctx.closePath();
            ctx.stroke();

            // Gerar inimigos
            if(Math.random() < 0.03 + (nivel * 0.01)) {
                inimigos.push({x: Math.random()*canvas.width, y: -50, s: 20+Math.random()*20});
            }

            // Tiros
            tiros.forEach((t, i) => {
                t.update(); t.draw();
                if(t.y < -50) tiros.splice(i, 1);
            });

            // Inimigos e Colisões
            inimigos.forEach((ini, ii) => {
                ini.y += 2 + nivel;
                ctx.strokeStyle = '#ff0055';
                ctx.strokeRect(ini.x - ini.s/2, ini.y - ini.s/2, ini.s, ini.s);

                tiros.forEach((t, ti) => {
                    let dist = Math.hypot(t.x - ini.x, t.y - ini.y);
                    if(dist < ini.s) {
                        criarExplosao(ini.x, ini.y, t.tipo === 'NUCLEAR' ? '#0f0' : '#f05');
                        inimigos.splice(ii, 1);
                        if(t.tipo !== 'NUCLEAR') tiros.splice(ti, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                        if(score % 2000 === 0 && nivel < 20) {
                            nivel++;
                            document.getElementById('lvl').innerText = nivel;
                        }
                    }
                });
                if(ini.y > canvas.height) inimigos.splice(ii, 1);
            });

            // Partículas de explosão
            particulas.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.cor;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 3, 3);
                ctx.globalAlpha = 1;
                if(p.life <= 0) particulas.splice(i, 1);
            });

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
