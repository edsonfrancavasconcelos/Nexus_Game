<!DOCTYPE html>
<html>
<head>
    <title>NEXUS GAME - WINGS FIGHT STYLE</title>
    <style>
        body { margin: 0; background: #00050a; overflow: hidden; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #hud { position: absolute; top: 25px; left: 25px; pointer-events: none; }
        .label { color: #00d4ff; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
        .value { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px #00d4ff; }
        canvas { display: block; filter: blur(0.4px); }
    </style>
</head>
<body>

    <div id="hud">
        <div class="label">Status do Sistema</div>
        <div class="value">NÍVEL <span id="lvl">1</span>/20</div>
        <div class="label">Armamento Ativo</div>
        <div id="arma" class="value" style="color: #ff0055;">LASER</div>
        <div class="label">Energia de Combate</div>
        <div id="score" class="value">0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0; let nivel = 1; let armaAtual = 'LASER';
        let mouse = { x: canvas.width/2, y: canvas.height/2 };
        const tiros = []; const inimigos = []; const particulas = [];

        // Estrelas com profundidade
        const estrelas = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            z: Math.random() * 3 + 1
        }));

        // --- DESENHO DA NAVE REALISTA ---
        function desenharNave(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Fogo do Motor (Oscilante)
            const engineSize = 15 + Math.random() * 10;
            const grdEngine = ctx.createRadialGradient(0, 25, 0, 0, 25, engineSize);
            grdEngine.addColorStop(0, '#fff');
            grdEngine.addColorStop(0.4, '#00d4ff');
            grdEngine.addColorStop(1, 'transparent');
            ctx.fillStyle = grdEngine;
            ctx.beginPath();
            ctx.arc(0, 25, engineSize, 0, Math.PI*2);
            ctx.fill();

            // Corpo Metálico
            const grdBody = ctx.createLinearGradient(-15, 0, 15, 0);
            grdBody.addColorStop(0, '#16213e');
            grdBody.addColorStop(0.5, '#00d4ff');
            grdBody.addColorStop(1, '#16213e');
            
            ctx.fillStyle = grdBody;
            ctx.beginPath();
            ctx.moveTo(0, -25); // Nariz
            ctx.lineTo(-8, -5); ctx.lineTo(-18, 15); // Asa Esq
            ctx.lineTo(0, 10); // Centro traseiro
            ctx.lineTo(18, 15); ctx.lineTo(8, -5); // Asa Dir
            ctx.closePath();
            ctx.fill();
            
            // Detalhes de Cockpit
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.ellipse(0, -5, 4, 8, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();
        }

        function desenharInimigo(x, y, s) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI); // Aponta para baixo

            // Brilho do motor inimigo
            ctx.fillStyle = '#ff005544';
            ctx.beginPath(); ctx.arc(0, 15, s/2, 0, Math.PI*2); ctx.fill();

            // Fuselagem Inimiga
            ctx.fillStyle = '#330011';
            ctx.strokeStyle = '#ff0055';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.lineTo(-s, s); ctx.lineTo(0, s/2); ctx.lineTo(s, s);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            ctx.restore();
        }

        // --- LÓGICA DE TIROS ---
        class Projectile {
            constructor(x, y, tipo, angle = 0) {
                this.x = x; this.y = y; this.tipo = tipo; this.angle = angle;
                this.v = tipo === 'NUCLEAR' ? 5 : 18;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.shadowBlur = 15;
                if(this.tipo === 'LASER') {
                    ctx.shadowColor = '#ff0000';
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-1, -15, 2, 25);
                } else if(this.tipo === 'HYDRO') {
                    ctx.shadowColor = '#00ffff';
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.shadowColor = '#00ff00';
                    ctx.fillStyle = '#0f0';
                    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }

        // --- LOOP PRINCIPAL ---
        function update() {
            ctx.fillStyle = '#000814';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrelas Parallax
            estrelas.forEach(s => {
                s.y += s.z;
                if(s.y > canvas.height) s.y = 0;
                ctx.fillStyle = `rgba(255,255,255,${s.z/4})`;
                ctx.fillRect(s.x, s.y, s.z/2, s.z/2);
            });

            desenharNave(mouse.x, mouse.y);

            // Gerar Inimigos (IA Progressiva)
            if(Math.random() < 0.02 + (nivel * 0.01)) {
                inimigos.push({x: Math.random()*canvas.width, y: -50, s: 20+Math.random()*10});
            }

            // Tiros
            tiros.forEach((t, i) => {
                t.y -= t.v; t.x += t.angle;
                t.draw();
                if(t.y < -50) tiros.splice(i, 1);
            });

            // Inimigos
            inimigos.forEach((ini, ii) => {
                ini.y += 3 + (nivel * 0.5);
                desenharInimigo(ini.x, ini.y, ini.s);

                // Colisão
                tiros.forEach((t, ti) => {
                    if(Math.hypot(t.x - ini.x, t.y - ini.y) < ini.s + 10) {
                        inimigos.splice(ii, 1);
                        if(t.tipo !== 'NUCLEAR') tiros.splice(ti, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                        if(score % 2000 === 0 && nivel < 20) { nivel++; document.getElementById('lvl').innerText = nivel; }
                    }
                });
                if(ini.y > canvas.height + 50) inimigos.splice(ii, 1);
            });

            requestAnimationFrame(update);
        }

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => {
            if(armaAtual === 'LASER') tiros.push(new Projectile(mouse.x, mouse.y, 'LASER'));
            if(armaAtual === 'HYDRO') {
                [-3, 0, 3].forEach(a => tiros.push(new Projectile(mouse.x, mouse.y, 'HYDRO', a)));
            }
            if(armaAtual === 'NUCLEAR') tiros.push(new Projectile(mouse.x, mouse.y, 'NUCLEAR'));
        });
        window.addEventListener('keydown', e => {
            if(e.key === '1') { armaAtual = 'LASER'; document.getElementById('arma').style.color = '#ff0055'; }
            if(e.key === '2') { armaAtual = 'HYDRO'; document.getElementById('arma').style.color = '#00d4ff'; }
            if(e.key === '3') { armaAtual = 'NUCLEAR'; document.getElementById('arma').style.color = '#00ff00'; }
            document.getElementById('arma').innerText = armaAtual;
        });

        update();
    </script>
</body>
</html>
