<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nexus Game 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00d4ff; pointer-events: none; }
        .stat { font-size: 1.2rem; margin-bottom: 5px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">NÍVEL: <span id="level">1</span>/20</div>
    <div class="stat">ARMA: <span id="weapon">LASER</span></div>
    <div class="stat">SCORE: <span id="score">0</span></div>
    <div style="font-size: 0.8rem; color: #fff;">1: Laser | 2: Hydro | 3: Nuclear</div>
</div>

<script src="https://cloudflare.com"></script>

<script>
// --- CONFIGURAÇÃO INICIAL ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- ESTADO DO JOGO ---
let score = 0;
let level = 1;
let currentWeapon = 'LASER';
const keys = {};
const mouse = { x: 0, y: 0 };

// --- NAVE (3D) ---
const shipGroup = new THREE.Group();
const bodyGeo = new THREE.ConeGeometry(0.5, 2, 8);
const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00d4ff });
const shipBody = new THREE.Mesh(bodyGeo, bodyMat);
shipBody.rotation.x = Math.PI / 2;
shipGroup.add(shipBody);

const wingGeo = new THREE.BoxGeometry(2, 0.1, 0.5);
const wing = new THREE.Mesh(wingGeo, bodyMat);
shipGroup.add(wing);

scene.add(shipGroup);
camera.position.z = 10;

// --- LUZES ---
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0, 0, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// --- TIROS ---
const bullets = [];
function fire() {
    let geo, mat, speed, color;
    
    if(currentWeapon === 'LASER') {
        geo = new THREE.CylinderGeometry(0.05, 0.05, 1);
        color = 0xff0000;
        speed = 0.5;
    } else if(currentWeapon === 'HYDRO') {
        geo = new THREE.SphereGeometry(0.2);
        color = 0x00ffff;
        speed = 0.3;
    } else { // NUCLEAR
        geo = new THREE.IcosahedronGeometry(0.4);
        color = 0x00ff00;
        speed = 0.15;
    }

    mat = new THREE.MeshBasicMaterial({ color: color });
    const b = new THREE.Mesh(geo, mat);
    b.position.copy(shipGroup.position);
    if(currentWeapon === 'LASER') b.rotation.x = Math.PI / 2;
    b.userData = { speed };
    scene.add(b);
    bullets.push(b);
}

// --- INPUTS ---
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key === '1') currentWeapon = 'LASER';
    if(e.key === '2') currentWeapon = 'HYDRO';
    if(e.key === '3') currentWeapon = 'NUCLEAR';
    if(e.key === ' ') fire();
    document.getElementById('weapon').innerText = currentWeapon;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});
window.addEventListener('mousedown', fire);

// --- LOOP DE ANIMAÇÃO ---
function animate() {
    requestAnimationFrame(animate);

    // Movimento Teclado
    if(keys['w']) shipGroup.position.y += 0.1;
    if(keys['s']) shipGroup.position.y -= 0.1;
    if(keys['a']) shipGroup.position.x -= 0.1;
    if(keys['d']) shipGroup.position.x += 0.1;

    // Movimento Mouse (Suave)
    shipGroup.position.x += (mouse.x * 10 - shipGroup.position.x) * 0.1;
    shipGroup.position.y += (mouse.y * 6 - shipGroup.position.y) * 0.1;

    // Inclinação da nave ao mover
    shipGroup.rotation.y = (mouse.x * 0.5);
    shipGroup.rotation.z = -(mouse.x * 0.5);

    // Atualizar Tiros
    bullets.forEach((b, index) => {
        b.position.z -= b.userData.speed;
        if(b.position.z < -20) {
            scene.remove(b);
            bullets.splice(index, 1);
        }
    });

    // Simulação de Score e Nível
    score += 1;
    document.getElementById('score').innerText = score;
    if(score % 1000 === 0 && level < 20) {
        level++;
        document.getElementById('level').innerText = level;
    }

    renderer.render(scene, camera);
}

animate();

// Ajuste de tela
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
