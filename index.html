<!DOCTYPE html>
<html>
<head>
    <title>NEXUS GAME - MOTOR INTERNO</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #00ff00; font-family: 'Courier New', monospace; }
        #hud { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="hud">
        <h1 style="margin:0">NEXUS GAME</h1>
        <div>ARMA: <span id="arma">LASER</span> | NÍVEL: <span id="lvl">1</span>/20</div>
        <div>SCORE: <span id="score">0</span></div>
        <div style="color: #aaa; font-size: 12px; margin-top: 10px;">[1] LASER | [2] HYDRO | [3] NUCLEAR</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- ESTADO DO JOGO ---
        let score = 0;
        let nivel = 1;
        let armaAtual = 'LASER';
        let mouse = { x: canvas.width/2, y: canvas.height/2 };
        const tiros = [];
        const inimigos = [];

        // --- CLASSES ---
        class Nave {
            draw() {
                ctx.save();
                ctx.translate(mouse.x, mouse.y);
                
                // Desenho da Nave em Perspectiva (Pseudo-3D)
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -20); // Nariz
                ctx.lineTo(-20, 20); // Asa esquerda
                ctx.lineTo(0, 10);   // Traseira
                ctx.lineTo(20, 20);  // Asa direita
                ctx.closePath();
                ctx.stroke();
                
                // Brilho do motor
                ctx.fillStyle = '#00d4ff44';
                ctx.fill();
                ctx.restore();
            }
        }

        class Tiro {
            constructor(x, y, tipo) {
                this.x = x;
                this.y = y;
                this.tipo = tipo;
                this.size = tipo === 'NUCLEAR' ? 15 : 4;
                this.color = tipo === 'LASER' ? '#ff0000' : (tipo === 'HYDRO' ? '#00ffff' : '#00ff00');
                this.speed = tipo === 'NUCLEAR' ? 5 : 12;
            }
            update() { this.y -= this.speed; if(this.tipo === 'NUCLEAR') this.size += 0.5; }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Inimigo {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.size = 20 + Math.random() * 30;
                this.speed = 1 + (nivel * 0.5);
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.strokeStyle = '#ff0055';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            }
        }

        const player = new Nave();

        // --- CONTROLES ---
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => {
            tiros.push(new Tiro(mouse.x, mouse.y, armaAtual));
        });
        window.addEventListener('keydown', e => {
            if(e.key === '1') armaAtual = 'LASER';
            if(e.key === '2') armaAtual = 'HYDRO';
            if(e.key === '3') armaAtual = 'NUCLEAR';
            document.getElementById('arma').innerText = armaAtual;
        });

        // --- LOOP PRINCIPAL ---
        function loop() {
            // Limpa a tela com rastro
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            player.draw();

            // Gerar inimigos
            if(Math.random() < 0.02 + (nivel * 0.005)) inimigos.push(new Inimigo());

            // Processar Tiros
            tiros.forEach((t, ti) => {
                t.update();
                t.draw();
                if(t.y < 0) tiros.splice(ti, 1);
            });

            // Processar Inimigos
            inimigos.forEach((ini, ii) => {
                ini.update();
                ini.draw();

                // Colisão com Tiros
                tiros.forEach((t, ti) => {
                    let dx = t.x - ini.x;
                    let dy = t.y - ini.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if(dist < ini.size) {
                        inimigos.splice(ii, 1);
                        if(t.tipo !== 'NUCLEAR') tiros.splice(ti, 1); // Nuclear atravessa!
                        score += 100;
                        document.getElementById('score').innerText = score;
                        
                        if(score % 2000 === 0 && nivel < 20) {
                            nivel++;
                            document.getElementById('lvl').innerText = nivel;
                        }
                    }
                });

                if(ini.y > canvas.height) inimigos.splice(ii, 1);
            });

            requestAnimationFrame(loop);
        }

        loop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
